

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yellow Text Legibility Examples</title>
</head>
<body style="background-color: white; font-family: serif; padding: 2em;">

  <h2>1. Yellow Text with Black Outline</h2>
  <p style="
    color: yellow;
    font-size: 13em;
    text-shadow:
      -1px -1px 0 black,
       1px -1px 0 black,
      -1px  1px 0 black,
       1px  1px 0 black;
  ">
    This is yellow text with a black outline.
  </p>

  <h2>2. Yellow Text with Drop Shadow</h2>
  <p style="
    color: yellow;
    font-size: 1em;
    text-shadow: 1px 1px 1px black;
  ">
    This is yellow text with a drop shadow.
  </p>

  <h2>3. Yellow Text with Black Background Highlight</h2>
  <p style="font-size: 1em;">
    <span style="
      color: yellow;
      background-color: black;
      padding: 2px 6px;
    ">
      This is yellow text on a black background.
    </span>
  </p>

</body>
</html>
